{# Preview overlay — DESIGN.md §7.4, §12.4 #}
<div
    class="preview-overlay js-preview-overlay"
    aria-label="Reel preview"
    aria-hidden="true"
    role="dialog"
>
    <div class="preview-overlay__backdrop js-preview-close"></div>

    <div class="preview-overlay__content">
        {# Close button #}
        <button
            type="button"
            class="btn-icon preview-overlay__close js-preview-close-btn"
            aria-label="Close preview"
        >
            <i class="ph ph-x" aria-hidden="true" style="font-size: 24px;"></i>
        </button>

        {# Video player #}
        <div class="preview-overlay__player">
            <video
                class="preview-overlay__video js-preview-video hidden"
                playsinline
                aria-label="Reel preview video"
            ></video>
            <div class="preview-overlay__video-placeholder js-preview-placeholder">
                <i class="ph-duotone ph-play-circle preview-overlay__play-icon" aria-hidden="true"></i>
                <p class="body-small preview-overlay__hint">Generate clips to preview your reel.</p>
            </div>
        </div>

        {# Time display #}
        <div class="preview-overlay__time body-small" aria-live="polite">
            <span class="js-preview-current-time">0:00</span>
            <span>/</span>
            <span class="js-preview-total-time">0:00</span>
        </div>

        {# Timeline scrubber bar #}
        <div class="preview-overlay__timeline js-preview-timeline" aria-label="Timeline scrubber">
            <div class="preview-overlay__scrubber">
                <div class="preview-overlay__scrubber-track js-preview-scrubber-track">
                    <div class="preview-overlay__scrubber-progress js-preview-progress" aria-hidden="true"></div>
                </div>
            </div>
        </div>

        {# Playback controls #}
        <div class="preview-overlay__controls">
            <button type="button" class="btn btn--ghost btn--sm js-preview-restart" aria-label="Restart playback">
                <i class="ph ph-skip-back" aria-hidden="true"></i>
            </button>
            <button type="button" class="btn btn--primary btn--md js-preview-play" aria-label="Play">
                <i class="ph ph-play" aria-hidden="true"></i>
            </button>
            <button type="button" class="btn btn--ghost btn--sm js-preview-pause hidden" aria-label="Pause playback">
                <i class="ph ph-pause" aria-hidden="true"></i>
            </button>
        </div>
    </div>
</div>
