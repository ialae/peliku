{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Peliku{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400&display=swap"
        rel="stylesheet"
    >

    <!-- Phosphor Icons -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"
    >
    <link
        rel="stylesheet"
        href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css"
    >

    <!-- CSS: order matters -->
    <link rel="stylesheet" href="{% static 'css/reset.css' %}">
    <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
    <link rel="stylesheet" href="{% static 'css/typography.css' %}">
    <link rel="stylesheet" href="{% static 'css/layout.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/animations.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Global Header Nav -->
    <header class="site-header" role="banner">
        <div class="site-header__inner">
            <a href="{% url 'core:home' %}" class="site-header__logo" aria-label="Peliku — Home">
                <i class="ph-duotone ph-film-reel site-header__logo-icon" aria-hidden="true"></i>
                <span>Peliku</span>
            </a>
            <div class="site-header__actions">
                {% block header_actions %}{% endblock %}
                <button
                    type="button"
                    class="btn-icon js-settings-toggle"
                    aria-label="Open settings"
                    title="Settings"
                >
                    <i class="ph ph-gear" aria-hidden="true" style="font-size: 24px;"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" role="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Settings Panel -->
    {% include "core/partials/settings_panel.html" %}

    <!-- Page-specific overlays -->
    {% block overlay %}{% endblock %}

    <!-- jQuery 3.7+ -->
    <script
        src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
        crossorigin="anonymous"
    ></script>
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
